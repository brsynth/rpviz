name: Lint

on:
  pull_request:
  push:
    branches:
      - main
      - stable
      - dev
    paths:
      - '**.py'

jobs:
  lint:
    if: github.head_ref != 'stable'
    # if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip
      - run: pip install ruff black mypy

      - run: ruff check .
      - run: black --check .
